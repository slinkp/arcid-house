<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aRCid house</title>
</head>

<body>
  <div id="app">

  <div id="start-screen">
    <h1>aRCid house</h1>
    <div id="controls"> control instructions go here </div>
  </div>

  <p id="status">Press 1P START</p>

  <div id="running-app" class="hidden">
    <h2>drums</h2>
    <div id="global-controls">
      <button id="play-pause">&#9654;</button>
      <label id="bpm-control">
        BPM <input type="number" id="bpm" value="120" min="20" max="300" />
      </label>
    </div>
    <div id="step-grid"></div>
    <p id="debug">x:0 y:1 step:-</p>
   </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
